  <line x1="90" y1="60" x2="120" y2="60" opacity="0.6" />
  <line x1="60" y1="90" x2="60" y2="120" opacity="0.6" />
  <!-- Small accent dots inward -->
  <circle cx="105" cy="60" r="1.8" fill="#c9a875" stroke="none" />
  <circle cx="60" cy="105" r="1.8" fill="#c9a875" stroke="none" />

  <!-- ============ TOP-RIGHT CORNER ORNAMENT ============ -->
  <path d="M 1860 60 L 1845 45 L 1830 60 L 1845 75 Z" fill="#c9a875" stroke="none" />
