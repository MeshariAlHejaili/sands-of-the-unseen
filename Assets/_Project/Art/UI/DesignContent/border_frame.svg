  <line x1="1580" y1="55" x2="1580" y2="65" opacity="0.5" />
  
  <!-- Small dots flanking center diamond -->
  <circle cx="900" cy="60" r="2" fill="#c9a875" stroke="none" opacity="0.7" />
  <circle cx="1020" cy="60" r="2" fill="#c9a875" stroke="none" opacity="0.7" />

  <!-- ============ LEFT EDGE — broken segments ============ -->
  <line x1="60" y1="120" x2="60" y2="320" />
