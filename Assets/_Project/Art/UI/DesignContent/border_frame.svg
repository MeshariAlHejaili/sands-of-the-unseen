<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none" stroke="#c9a875" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" preserveAspectRatio="none">

  <!-- ============ TOP EDGE — broken segments ============ -->
  <line x1="120" y1="60" x2="320" y2="60" />
  <line x1="360" y1="60" x2="680" y2="60" opacity="0.65" />
  <line x1="720" y1="60" x2="940" y2="60" />
  
  <!-- Top center diamond -->
  <path d="M 960 52 L 970 60 L 960 68 L 950 60 Z" fill="#c9a875" stroke="none" />
  <path d="M 960 46 L 976 60 L 960 74 L 944 60 Z" opacity="0.4" />
  
  <line x1="980" y1="60" x2="1200" y2="60" />
  <line x1="1240" y1="60" x2="1560" y2="60" opacity="0.65" />
