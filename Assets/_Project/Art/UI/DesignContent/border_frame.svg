  <line x1="60" y1="580" x2="60" y2="780" />
  <line x1="60" y1="820" x2="60" y2="1020" opacity="0.65" />
  
  <line x1="55" y1="340" x2="65" y2="340" opacity="0.5" />
  <line x1="55" y1="560" x2="65" y2="560" opacity="0.5" />
  <line x1="55" y1="800" x2="65" y2="800" opacity="0.5" />
  
  <circle cx="60" cy="450" r="2" fill="#c9a875" stroke="none" opacity="0.7" />
  <circle cx="60" cy="680" r="2" fill="#c9a875" stroke="none" opacity="0.7" />

  <!-- ============ RIGHT EDGE — broken segments ============ -->
  <line x1="1860" y1="120" x2="1860" y2="320" opacity="0.65" />
  <line x1="1860" y1="360" x2="1860" y2="540" />
  <line x1="1860" y1="580" x2="1860" y2="780" opacity="0.65" />
  <line x1="1860" y1="820" x2="1860" y2="1020" />
  
  <line x1="1855" y1="340" x2="1865" y2="340" opacity="0.5" />
  <line x1="1855" y1="560" x2="1865" y2="560" opacity="0.5" />
  <line x1="1855" y1="800" x2="1865" y2="800" opacity="0.5" />
  
  <circle cx="1860" cy="450" r="2" fill="#c9a875" stroke="none" opacity="0.7" />
  <circle cx="1860" cy="680" r="2" fill="#c9a875" stroke="none" opacity="0.7" />

  <!-- ============ BOTTOM EDGE — clean single line ============ -->
  <line x1="60" y1="1020" x2="1860" y2="1020" stroke-width="1.2" />

  <!-- ============ TOP-LEFT CORNER ORNAMENT ============ -->
  <!-- Solid corner diamond -->
  <path d="M 60 60 L 75 45 L 90 60 L 75 75 Z" fill="#c9a875" stroke="none" />
  <!-- Outer halo -->
  <path d="M 50 60 L 75 35 L 100 60 L 75 85 Z" opacity="0.35" />
