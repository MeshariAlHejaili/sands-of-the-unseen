<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#c9a875" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring (broken/weathered) -->
  <path d="M 50 8 A 42 42 0 0 1 92 50" />
  <path d="M 92 50 A 42 42 0 0 1 78 81" />
  <path d="M 72 86 A 42 42 0 0 1 28 86" />
  <path d="M 22 81 A 42 42 0 0 1 8 50" />
  <path d="M 8 50 A 42 42 0 0 1 50 8" opacity="0.4" />
  
  <!-- Inner thin ring -->
  <circle cx="50" cy="50" r="35" opacity="0.25" stroke-dasharray="2 3" />
  
  <!-- Outer compass ring with cog-like notches -->
  <circle cx="50" cy="50" r="22" />
  
  <!-- 8 cog teeth / cardinal markers -->
  <line x1="50" y1="22" x2="50" y2="28" stroke-width="1.5" />
  <line x1="50" y1="72" x2="50" y2="78" stroke-width="1.5" />
  <line x1="22" y1="50" x2="28" y2="50" stroke-width="1.5" />
  <line x1="72" y1="50" x2="78" y2="50" stroke-width="1.5" />
  <line x1="30" y1="30" x2="34" y2="34" opacity="0.7" />
  <line x1="70" y1="30" x2="66" y2="34" opacity="0.7" />
  <line x1="30" y1="70" x2="34" y2="66" opacity="0.7" />
  <line x1="70" y1="70" x2="66" y2="66" opacity="0.7" />
  
  <!-- Inner compass circle -->
  <circle cx="50" cy="50" r="14" opacity="0.5" />
  
  <!-- Compass needle (north pointing, diamond shape) -->
  <path d="M 50 36 L 54 50 L 50 64 L 46 50 Z" />
  
  <!-- Filled north tip -->
  <path d="M 50 36 L 54 50 L 46 50 Z" fill="#c9a875" stroke="none" opacity="0.85" />
  
  <!-- Center pivot -->
  <circle cx="50" cy="50" r="1.8" fill="#c9a875" stroke="none" />
  
  <!-- Small N marker dot above -->
  <circle cx="50" cy="32" r="0.8" fill="#c9a875" stroke="none" />
  
  <!-- Corner accents -->
  <circle cx="50" cy="8" r="0.8" fill="#c9a875" stroke="none" />
  <circle cx="50" cy="92" r="0.8" fill="#c9a875" stroke="none" />
</svg>
