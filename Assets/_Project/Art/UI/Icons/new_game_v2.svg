<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#c9a875" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring (broken/weathered) - matches set -->
  <path d="M 50 8 A 42 42 0 0 1 92 50" />
  <path d="M 92 50 A 42 42 0 0 1 78 81" />
  <path d="M 72 86 A 42 42 0 0 1 28 86" />
  <path d="M 22 81 A 42 42 0 0 1 8 50" />
  <path d="M 8 50 A 42 42 0 0 1 50 8" opacity="0.4" />
  
  <!-- Inner thin ring -->
  <circle cx="50" cy="50" r="35" opacity="0.25" stroke-dasharray="2 3" />
  
  <!-- Heart silhouette (anatomical-stylized, slightly angular for sci-fi feel) -->
  <path d="M 50 72 
           C 50 72, 30 60, 28 46
           C 27 38, 32 32, 38 32
           C 43 32, 47 35, 50 40
           C 53 35, 57 32, 62 32
           C 68 32, 73 38, 72 46
           C 70 60, 50 72, 50 72 Z" 
        stroke-width="1.4" />
  
  <!-- Inner core chamber (the artificial soul-core) -->
  <circle cx="50" cy="48" r="6" fill="#c9a875" stroke="none" opacity="0.9" />
  <circle cx="50" cy="48" r="9" opacity="0.5" />
  
  <!-- Core energy pulse rings (4-pointed soul mark) -->
  <path d="M 50 42 L 51 47 L 50 48 L 49 47 Z" fill="#1a1410" stroke="none" />
  <path d="M 50 54 L 51 49 L 50 48 L 49 49 Z" fill="#1a1410" stroke="none" />
  <path d="M 44 48 L 49 49 L 50 48 L 49 47 Z" fill="#1a1410" stroke="none" />
  <path d="M 56 48 L 51 49 L 50 48 L 51 47 Z" fill="#1a1410" stroke="none" />
  
  <!-- Mechanical ports / arteries (top of heart) -->
  <line x1="42" y1="32" x2="40" y2="26" stroke-width="1.4" />
  <line x1="50" y1="32" x2="50" y2="22" stroke-width="1.4" />
  <line x1="58" y1="32" x2="60" y2="26" stroke-width="1.4" />
  
  <!-- Port caps -->
  <circle cx="40" cy="25" r="1.4" fill="#c9a875" stroke="none" />
  <circle cx="50" cy="21" r="1.6" fill="#c9a875" stroke="none" />
  <circle cx="60" cy="25" r="1.4" fill="#c9a875" stroke="none" />
  
  <!-- Vein/circuit lines along heart (the gene-fusion detail) -->
  <path d="M 35 44 Q 40 50 38 58" opacity="0.5" />
  <path d="M 65 44 Q 60 50 62 58" opacity="0.5" />
  
  <!-- Pulse indicator dots at base -->
  <circle cx="50" cy="76" r="0.8" fill="#c9a875" stroke="none" opacity="0.7" />
  
  <!-- Side cycle marks (subtle hint at the loop) -->
  <path d="M 18 50 L 22 50" opacity="0.5" />
  <path d="M 78 50 L 82 50" opacity="0.5" />
  
  <!-- Corner accents -->
  <circle cx="50" cy="8" r="0.8" fill="#c9a875" stroke="none" />
  <circle cx="50" cy="92" r="0.8" fill="#c9a875" stroke="none" />
</svg>
