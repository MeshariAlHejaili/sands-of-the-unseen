<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#c9a875" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring (broken/weathered) -->
  <path d="M 50 8 A 42 42 0 0 1 92 50" />
  <path d="M 92 50 A 42 42 0 0 1 78 81" />
  <path d="M 72 86 A 42 42 0 0 1 28 86" />
  <path d="M 22 81 A 42 42 0 0 1 8 50" />
  <path d="M 8 50 A 42 42 0 0 1 50 8" opacity="0.4" />
  
  <!-- Inner thin ring -->
  <circle cx="50" cy="50" r="35" opacity="0.25" stroke-dasharray="2 3" />
  
  <!-- Hourglass top frame -->
  <path d="M 35 28 L 65 28" stroke-width="1.4" />
  <path d="M 35 28 L 50 50" />
  <path d="M 65 28 L 50 50" />
  
  <!-- Hourglass bottom frame -->
  <path d="M 35 72 L 65 72" stroke-width="1.4" />
  <path d="M 35 72 L 50 50" />
  <path d="M 65 72 L 50 50" />
  
  <!-- Sand top (settled) -->
  <path d="M 39 32 L 61 32 L 53 44 Q 50 47 47 44 Z" fill="#c9a875" stroke="none" opacity="0.85" />
  
  <!-- Falling sand stream -->
  <line x1="50" y1="48" x2="50" y2="58" opacity="0.9" />
  
  <!-- Sand bottom (piled) -->
  <path d="M 41 68 Q 50 62 59 68 L 61 68 L 39 68 Z" fill="#c9a875" stroke="none" opacity="0.85" />
  
  <!-- Sand particles falling/drifting -->
  <circle cx="46" cy="54" r="0.6" fill="#c9a875" stroke="none" opacity="0.6" />
  <circle cx="54" cy="56" r="0.6" fill="#c9a875" stroke="none" opacity="0.6" />
  <circle cx="48" cy="62" r="0.6" fill="#c9a875" stroke="none" opacity="0.5" />
  <circle cx="52" cy="64" r="0.6" fill="#c9a875" stroke="none" opacity="0.5" />
  
  <!-- Side accent marks -->
  <line x1="22" y1="50" x2="28" y2="50" opacity="0.5" />
  <line x1="72" y1="50" x2="78" y2="50" opacity="0.5" />
  
  <!-- Corner accents -->
  <circle cx="50" cy="8" r="0.8" fill="#c9a875" stroke="none" />
  <circle cx="50" cy="92" r="0.8" fill="#c9a875" stroke="none" />
</svg>
